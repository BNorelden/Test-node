name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        run: |
          git clone https://github.com/${{ github.repository }} .

      - name: Build Docker image
        run: docker build -t dockfordevs/node .

      - name: List Docker images
        run: docker images dockfordevs/node

